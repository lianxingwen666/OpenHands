<!DOCTYPE html>
<html>
<head>
    <meta charset="utf-8">
    <title>生成扩展图标</title>
    <style>
        body {
            font-family: Arial, sans-serif;
            padding: 20px;
            background: #f5f5f5;
        }
        .icon-container {
            display: inline-block;
            margin: 10px;
            text-align: center;
        }
        .icon {
            border-radius: 8px;
            display: flex;
            align-items: center;
            justify-content: center;
            background: linear-gradient(135deg, #007bff, #0056b3);
            color: white;
            font-weight: bold;
            margin-bottom: 10px;
        }
        .icon16 { width: 16px; height: 16px; font-size: 10px; }
        .icon48 { width: 48px; height: 48px; font-size: 24px; }
        .icon128 { width: 128px; height: 128px; font-size: 64px; }
        button {
            background: #007bff;
            color: white;
            border: none;
            padding: 10px 20px;
            border-radius: 5px;
            cursor: pointer;
            margin: 5px;
        }
        button:hover {
            background: #0056b3;
        }
        .instructions {
            background: white;
            padding: 20px;
            border-radius: 8px;
            margin: 20px 0;
            border-left: 4px solid #007bff;
        }
    </style>
</head>
<body>
    <h1>🎨 自动评教助手 - 图标生成器</h1>

    <div class="instructions">
        <h3>📋 使用说明：</h3>
        <ol>
            <li>点击下面的"生成图标"按钮</li>
            <li>右键点击每个图标，选择"图片另存为"</li>
            <li>分别保存为 icon16.png、icon48.png、icon128.png</li>
            <li>将图标文件放到扩展文件夹中</li>
            <li>重新加载扩展</li>
        </ol>
    </div>

    <div id="icons-container">
        <div class="icon-container">
            <canvas id="icon16" class="icon icon16"></canvas>
            <div>16x16</div>
            <button onclick="downloadIcon('icon16', 16)">下载 icon16.png</button>
        </div>

        <div class="icon-container">
            <canvas id="icon48" class="icon icon48"></canvas>
            <div>48x48</div>
            <button onclick="downloadIcon('icon48', 48)">下载 icon48.png</button>
        </div>

        <div class="icon-container">
            <canvas id="icon128" class="icon icon128"></canvas>
            <div>128x128</div>
            <button onclick="downloadIcon('icon128', 128)">下载 icon128.png</button>
        </div>
    </div>

    <div class="instructions">
        <h3>🔧 快速修复（推荐）：</h3>
        <p>如果您不需要图标，可以直接使用已修复的 manifest.json 文件，该文件已移除图标引用。</p>
    </div>

    <script>
        function createIcon(canvasId, size) {
            const canvas = document.getElementById(canvasId);
            const ctx = canvas.getContext('2d');

            canvas.width = size;
            canvas.height = size;

            // 创建渐变背景
            const gradient = ctx.createLinearGradient(0, 0, size, size);
            gradient.addColorStop(0, '#007bff');
            gradient.addColorStop(1, '#0056b3');

            // 绘制背景
            ctx.fillStyle = gradient;
            ctx.roundRect(0, 0, size, size, size * 0.15);
            ctx.fill();

            // 绘制文字
            ctx.fillStyle = 'white';
            ctx.font = `bold ${size * 0.5}px Arial`;
            ctx.textAlign = 'center';
            ctx.textBaseline = 'middle';
            ctx.fillText('评', size / 2, size / 2);
        }

        function downloadIcon(canvasId, size) {
            const canvas = document.getElementById(canvasId);
            const link = document.createElement('a');
            link.download = `icon${size}.png`;
            link.href = canvas.toDataURL();
            link.click();
        }

        // 页面加载时生成图标
        window.onload = function() {
            createIcon('icon16', 16);
            createIcon('icon48', 48);
            createIcon('icon128', 128);
        };

        // 添加 roundRect 方法支持（兼容性）
        if (!CanvasRenderingContext2D.prototype.roundRect) {
            CanvasRenderingContext2D.prototype.roundRect = function(x, y, width, height, radius) {
                this.beginPath();
                this.moveTo(x + radius, y);
                this.lineTo(x + width - radius, y);
                this.quadraticCurveTo(x + width, y, x + width, y + radius);
                this.lineTo(x + width, y + height - radius);
                this.quadraticCurveTo(x + width, y + height, x + width - radius, y + height);
                this.lineTo(x + radius, y + height);
                this.quadraticCurveTo(x, y + height, x, y + height - radius);
                this.lineTo(x, y + radius);
                this.quadraticCurveTo(x, y, x + radius, y);
                this.closePath();
            };
        }
    </script>
</body>
</html>
