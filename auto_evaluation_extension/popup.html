<!DOCTYPE html>
<html>
<head>
    <meta charset="utf-8">
    <style>
        body {
            width: 300px;
            padding: 20px;
            font-family: Arial, sans-serif;
        }
        .header {
            text-align: center;
            color: #333;
            margin-bottom: 20px;
        }
        .warning {
            background: #fff3cd;
            border: 1px solid #ffeaa7;
            padding: 10px;
            border-radius: 5px;
            margin-bottom: 15px;
            font-size: 12px;
        }
        .config-section {
            margin-bottom: 15px;
        }
        label {
            display: block;
            margin-bottom: 5px;
            font-weight: bold;
        }
        select, textarea, input {
            width: 100%;
            padding: 5px;
            border: 1px solid #ddd;
            border-radius: 3px;
            box-sizing: border-box;
        }
        textarea {
            height: 60px;
            resize: vertical;
        }
        .button-group {
            display: flex;
            gap: 10px;
            margin-top: 15px;
        }
        button {
            flex: 1;
            padding: 10px;
            border: none;
            border-radius: 5px;
            cursor: pointer;
            font-weight: bold;
        }
        .btn-primary {
            background: #007bff;
            color: white;
        }
        .btn-secondary {
            background: #6c757d;
            color: white;
        }
        .btn-primary:hover {
            background: #0056b3;
        }
        .btn-secondary:hover {
            background: #545b62;
        }
        .status {
            margin-top: 10px;
            padding: 8px;
            border-radius: 3px;
            text-align: center;
            font-size: 12px;
        }
        .status.success {
            background: #d4edda;
            color: #155724;
        }
        .status.error {
            background: #f8d7da;
            color: #721c24;
        }
    </style>
</head>
<body>
    <div class="header">
        <h3>🎓 自动评教助手</h3>
    </div>

    <div class="warning">
        <strong>⚠️ 重要提醒：</strong><br>
        • 仅供学习研究目的<br>
        • 建议进行真实客观评教<br>
        • 使用前请确认符合规定
    </div>

    <div class="config-section">
        <label for="strategy">评分策略：</label>
        <select id="strategy">
            <option value="realistic">🎯 现实策略 (推荐)</option>
            <option value="positive">😊 积极策略</option>
            <option value="conservative">🛡️ 保守策略</option>
            <option value="balanced">⚖️ 平衡策略</option>
            <option value="custom">🎛️ 固定分数</option>
        </select>
    </div>

    <div class="config-section" id="customRatingGroup" style="display: none;">
        <label for="rating">固定评分：</label>
        <select id="rating">
            <option value="5">5 - 非常满意</option>
            <option value="4">4 - 满意</option>
            <option value="3">3 - 一般</option>
            <option value="2">2 - 不满意</option>
            <option value="1">1 - 非常不满意</option>
        </select>
    </div>

    <div class="config-section" id="strategyInfo">
        <div style="font-size: 11px; color: #666; background: #f8f9fa; padding: 8px; border-radius: 3px;">
            <strong>现实策略：</strong>以4分为主，其他分数合理分布，避免全部相同分数
        </div>
    </div>

    <div class="config-section">
        <label for="comment">评语内容：</label>
        <textarea id="comment" placeholder="请输入评语...">老师教学认真负责，课程内容丰富，教学方法得当，受益匪浅。</textarea>
    </div>

    <div class="config-section">
        <label for="delay">操作延时（秒）：</label>
        <input type="number" id="delay" value="1" min="0.5" max="5" step="0.5">
    </div>

    <div class="button-group">
        <button id="autoFill" class="btn-primary">自动填写</button>
        <button id="preview" class="btn-secondary">预览</button>
    </div>

    <div id="status" class="status" style="display: none;"></div>

    <script src="popup_smart.js"></script>
</body>
</html>
